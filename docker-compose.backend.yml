services:
  paxs-eigent-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    restart: unless-stopped
    env_file: .env.backend
    volumes:
      # Allow gateway container to spawn per-request docker workers.
      # This gives the container access to the host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - paxs_agent_net
networks:
  paxs_agent_net:
    driver: bridge
